name: Weekly Build

on:
  workflow_dispatch:
  schedule:
  # NOTE - changes to the cron spec should be pushed by https://github.com/quic-yocto-ci
  # so that build notification emails will be sent out properly.
  - cron: "23 23 * * 0"   # weekly job - Run at 23:23 UTC every Sunday

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: read

jobs:
  build-weekly:
    uses: ./.github/workflows/build-yocto.yml